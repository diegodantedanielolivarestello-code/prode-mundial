<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>YIYOS TV PREMIUM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
<style>
:root{
  --bg:#030510;
  --cyan:#00e5ff;
  --magenta:#ff2a9d;
  --glass:rgba(12,18,40,0.65);
  --stroke:rgba(255,255,255,0.08);
  --text:#e6f6ff;
  --muted:#8fb7cc;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed; inset:-20%;
  background:
    radial-gradient(600px 400px at 15% 20%, rgba(138,43,226,.25), transparent 60%),
    radial-gradient(500px 500px at 85% 30%, rgba(0,229,255,.18), transparent 60%),
    radial-gradient(700px 600px at 50% 90%, rgba(255,42,157,.15), transparent 60%);
  filter:blur(20px);
  z-index:-3;
  animation:bgShift 24s ease-in-out infinite alternate;
}
@keyframes bgShift{to{transform:translateY(-20px) scale(1.05)}}
.bg-grid{
  position:fixed; inset:0;
  background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px), linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size:40px 40px;
  mask: radial-gradient(ellipse at center, black 40%, transparent 70%);
  z-index:-2;
}
.particles{position:fixed; inset:0; z-index:-1; pointer-events:none; overflow:hidden}
.particle{position:absolute; width:3px; height:3px; border-radius:50%; opacity:.7; filter:blur(.2px); animation:float linear infinite}
.particle.cyan{background:var(--cyan); box-shadow:0 0 8px var(--cyan)}
.particle.mag{background:var(--magenta); box-shadow:0 0 8px var(--magenta)}
@keyframes float{from{transform:translateY(110vh)} to{transform:translateY(-10vh)}}

.glass{
  background:var(--glass);
  backdrop-filter:blur(18px) saturate(140%);
  -webkit-backdrop-filter:blur(18px) saturate(140%);
  border:1px solid var(--stroke);
  border-radius:20px;
  box-shadow:0 10px 40px rgba(0,0,0,.5), inset 0 0 0 1px rgba(0,229,255,.06), inset 0 0 40px rgba(255,42,157,.04);
}

/* LOCK SCREEN CONTROLS */
#lock{
  position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center;
  background:rgba(3,5,16,.88); backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
  transition:opacity .35s ease;
}
#lock.hide{opacity:0; pointer-events:none}
.lock-card{
  width:min(92vw,420px); padding:34px 26px; text-align:center; position:relative;
}
.lock-card:before{
  content:""; position:absolute; inset:-1px; border-radius:20px; padding:1px;
  background:linear-gradient(135deg, var(--cyan), transparent 30%, var(--magenta));
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor; mask-composite:exclude; pointer-events:none; opacity:.6;
}
.logo-lock{
  width:72px; height:72px; margin:0 auto 14px; display:grid; place-items:center; border-radius:18px;
  font-family:Orbitron; font-weight:900; font-size:36px; color:#030510;
  background:linear-gradient(135deg, var(--cyan), var(--magenta));
  box-shadow:0 0 30px rgba(0,229,255,.5), 0 0 50px rgba(255,42,157,.35); animation:logoPulse 2.5s infinite alternate;
}
@keyframes logoPulse{from{filter:brightness(1)}to{filter:brightness(1.25)}}
.lock-card h1{font-family:Orbitron; margin:6px 0 4px; letter-spacing:1.5px; font-size:22px; text-shadow:0 0 18px rgba(0,229,255,.45)}
.lock-card p{margin:0 0 18px; color:var(--muted); font-size:13px; letter-spacing:.4px}
.lock-input-wrap{display:flex; gap:10px; margin-top:10px}
#pass-input{
  flex:1; background:rgba(0,0,0,.45); border:1px solid rgba(0,229,255,.25); color:var(--text);
  padding:14px; border-radius:12px; outline:none; font-size:16px; transition:.2s;
}
#pass-input:focus{border-color:var(--cyan); box-shadow:0 0 0 3px rgba(0,229,255,.15)}
#pass-btn{
  background:linear-gradient(90deg, var(--cyan), var(--magenta)); color:#030510; font-weight:800; letter-spacing:.6px;
  border:0; padding:0 18px; border-radius:12px; cursor:pointer; font-family:Orbitron; font-size:13px;
  box-shadow:0 0 20px rgba(0,229,255,.35), 0 0 30px rgba(255,42,157,.25); transition:transform .1s;
}
#pass-btn:active{transform:scale(.98)}
#lock-error{min-height:20px; margin-top:10px; color:#ff2a9d; font-size:13px; text-shadow:0 0 10px rgba(255,42,157,.4)}
.shake{animation:shake .42s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}

/* APP GENERAL WRAP */
#app{position:relative; z-index:1; min-height:100dvh; display:flex; flex-direction:column}

.topbar{
  display:flex; align-items:center; gap:12px;
  padding:12px 16px; margin:14px auto; width:calc(100% - 28px); max-width:1400px;
}
.logo{
  font-family:Orbitron, monospace; font-weight:900; letter-spacing:.12em;
  font-size:clamp(18px,2.6vw,28px); line-height:1;
  color:#fff; display:flex; align-items:center; gap:10px;
  text-shadow:0 0 10px rgba(0,229,255,.8), 0 0 22px rgba(255,42,157,.6), 0 0 40px rgba(0,229,255,.35);
}
.logo-badge{
  width:34px; height:34px; border-radius:10px;
  background:linear-gradient(135deg, var(--cyan), var(--magenta));
  box-shadow:0 0 18px rgba(0,229,255,.6), 0 0 28px rgba(255,42,157,.4);
  display:grid; place-items:center; font-weight:900; color:#030510;
}
.spacer{flex:1}
.btn{
  appearance:none; border:1px solid rgba(0,229,255,.35);
  background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
  color:#cffffa; padding:10px 14px; border-radius:14px; cursor:pointer;
  font-weight:500; letter-spacing:.3px; transition:.2s; display:inline-flex; align-items:center; gap:8px;
  box-shadow:0 0 0 0 rgba(0,229,255,0);
}
.btn:hover{transform:translateY(-1px); box-shadow:0 0 16px rgba(0,229,255,.35)}
.btn.mag{border-color:rgba(255,42,157,.45)}
.btn.mag:hover{box-shadow:0 0 16px rgba(255,42,157,.4)}
.btn.ghost{background:transparent; border-color:var(--stroke); color:#9edfff}
.btn-logout{border-color:rgba(255,42,157,.3); color:#ffd0ea; background:rgba(255,42,157,.05)}
.btn-logout:hover{background:rgba(255,42,157,.15); box-shadow:0 0 16px rgba(255,42,157,.25); border-color:var(--magenta)}

.wrap{max-width:1400px; margin:0 auto; padding:0 14px 24px; width:100%}
.main{
  display:grid; grid-template-columns:1.45fr .85fr; gap:16px; align-items:start;
}
@media(max-width:980px){
 .main{grid-template-columns:1fr}
}

.player-section{display:flex; flex-direction:column; gap:12px}
.player-wrap{position:relative; aspect-ratio:16/9; overflow:hidden}
.player-wrap video{
  width:100%; height:100%; display:block; background:#000; border-radius:20px; object-fit:contain;
}
.player-overlay{
  position:absolute; inset:0; pointer-events:none;
  background:linear-gradient(180deg, transparent 60%, rgba(0,0,0,.35));
  border-radius:20px;
}
.controls{
  position:absolute; left:10px; right:10px; bottom:10px; display:flex; gap:8px; justify-content:center; pointer-events:auto;
  opacity:0; transform:translateY(8px); transition:.25s;
}
.player-wrap:hover .controls,.player-wrap:focus-within .controls{opacity:1; transform:none}
.ctrl{
  width:42px; height:42px; display:grid; place-items:center; border-radius:12px;
  background:rgba(8,12,28,.7); border:1px solid var(--stroke); color:#dff; cursor:pointer; backdrop-filter:blur(8px);
}
.ctrl:hover{box-shadow:0 0 12px rgba(0,229,255,.5)}

.info{
  display:flex; align-items:center; gap:14px; padding:14px 16px;
}
.info.meta{min-width:0; flex:1}
.info h2{
  margin:0; font-family:Orbitron; font-size:clamp(16px,2vw,20px); letter-spacing:.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  text-shadow:0 0 12px rgba(0,229,255,.35);
}
.info p{margin:4px 0 0; color:#9abed4; font-size:13px}
.fav{
  width:46px; height:46px; border-radius:14px; display:grid; place-items:center; cursor:pointer; font-size:22px;
  background:rgba(255,255,255,.04); border:1px solid rgba(255,42,157,.4); color:#ffd0ea;
  box-shadow:inset 0 0 20px rgba(255,42,157,.12), 0 0 16px rgba(255,42,157,.2);
  transition:.2s;
}
.fav.active{color:#fff; background:linear-gradient(180deg, rgba(255,42,157,.35), rgba(255,42,157,.15)); box-shadow:0 0 18px rgba(255,42,157,.5)}

.sidebar{
  padding:12px; display:flex; flex-direction:column; gap:10px; position:sticky; top:14px; max-height:calc(100vh - 28px);
}
@media(max-width:980px){
 .sidebar{position:fixed; left:14px; right:14px; bottom:14px; top:76px; z-index:40; transform:translateY(120%); transition:.35s cubic-bezier(.2,.8,.2,1); max-height:none}
 .sidebar.open{transform:none}
}
.tabs{display:flex; gap:8px; padding:4px; background:rgba(0,0,0,.25); border:1px solid var(--stroke); border-radius:14px}
.tab{flex:1; padding:9px 10px; border-radius:10px; background:transparent; border:0; color:#bfefff; cursor:pointer; font-weight:600; letter-spacing:.3px}
.tab.active{background:linear-gradient(180deg, rgba(0,229,255,.18), rgba(0,229,255,.06)); box-shadow:inset 0 0 0 1px rgba(0,229,255,.35), 0 0 14px rgba(0,229,255,.18); color:#fff}

.tools{display:flex; gap:8px}
.input, select, textarea{
  width:100%; background:rgba(0,0,0,.35); color:#e6f6ff; border:1px solid var(--stroke); border-radius:12px; padding:11px 12px; outline:none; font-size:14px;
}
.input:focus, select:focus, textarea:focus{border-color:rgba(0,229,255,.5); box-shadow:0 0 0 3px rgba(0,229,255,.15)}
select{appearance:none; background-image:linear-gradient(45deg,transparent 50%, #7de9ff 50%), linear-gradient(135deg,#7de9ff 50%, transparent 50%); background-position:calc(100% - 18px) 16px, calc(100% - 12px) 16px; background-size:6px 6px; background-repeat:no-repeat}

.list{overflow:auto; padding:4px; margin:0 -4px; display:grid; gap:8px; grid-auto-rows:min-content}
.card{
  display:flex; gap:12px; align-items:center; padding:10px; border-radius:14px; cursor:pointer;
  background:rgba(255,255,255,.03); border:1px solid transparent; transition:.18s;
}
.card:hover{background:rgba(0,229,255,.08); border-color:rgba(0,229,255,.28); box-shadow:0 0 14px rgba(0,229,255,.12) inset}
.card.active{background:rgba(255,42,157,.12); border-color:rgba(255,42,157,.45); box-shadow:0 0 16px rgba(255,42,157,.18) inset}
.thumb{width:52px; height:52px; border-radius:12px; background:#050a18; border:1px solid var(--stroke); object-fit:cover; flex:0 0 auto; box-shadow:0 0 12px rgba(0,0,0,.4)}
.meta-mini{min-width:0; flex:1}
.name{font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:14.5px}
.group{color:#8fb7cc; font-size:12px; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}

.modal{position:fixed; inset:0; background:rgba(3,5,16,.72); display:grid; place-items:center; z-index:60; padding:18px}
.modal.hidden{display:none}
.sheet{width:min(820px,96vw); padding:18px}
.sheet h3{margin:4px 0 12px; font-family:Orbitron; letter-spacing:.6px}
.grid2{display:grid; grid-template-columns:1.1fr .9fr; gap:12px}
@media(max-width:720px){.grid2{grid-template-columns:1fr}}
.hint{font-size:12.5px; color:#9bbbd0}

.toasts{position:fixed; left:50%; bottom:18px; transform:translateX(-50%); z-index:80; display:flex; flex-direction:column; gap:8px; width:min(92vw,420px)}
.toast{padding:12px 14px; border-radius:12px; background:rgba(10,16,36,.9); border:1px solid rgba(0,229,255,.35); box-shadow:0 8px 30px rgba(0,0,0,.5), 0 0 18px rgba(0,229,255,.18); color:#dff; font-size:14px; animation:pop .25s ease}
.toast.err{border-color:rgba(255,42,157,.5); box-shadow:0 8px 30px rgba(0,0,0,.5), 0 0 18px rgba(255,42,157,.25)}
@keyframes pop{from{transform:translateY(8px); opacity:0}}

.badge-live{font-size:11px; padding:3px 8px; border-radius:999px; border:1px solid rgba(0,229,255,.4); color:#aefaff; background:rgba(0,229,255,.1); margin-left:8px; letter-spacing:.5px}
@media(max-width:580px){
  .badge-live{display:none}
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="particles" id="particles"></div>
<div class="toasts" id="toasts"></div>

<!-- PANTALLA DE BLOQUEO SEGURA -->
<div id="lock">
  <div class="lock-card glass">
    <div class="logo-lock">Y</div>
    <h1>YIYOS TV PREMIUM</h1>
    <p>ACCESO CIFRADO • NEON PROTOCOL</p>
    <div class="lock-input-wrap">
      <input type="password" id="pass-input" placeholder="Contraseña" autocomplete="current-password" inputmode="text">
      <button id="pass-btn">ENTRAR</button>
    </div>
    <div id="lock-error"></div>
  </div>
</div>

<!-- CONTENEDOR DE LA APLICACIÓN -->
<div id="app" aria-hidden="true">
  <header class="topbar glass">
    <div class="logo"><span class="logo-badge">Y</span> YIYOS TV PREMIUM</div>
    <span class="badge-live">LIVE HLS</span>
    <div class="spacer"></div>
    <button class="btn ghost" id="btn-list" title="Canales">☰</button>
    <button class="btn" id="btn-settings" title="Cargar lista">⚙️ Fuente</button>
    <button class="btn btn-logout" id="btn-logout" title="Cerrar sesión">❌</button>
  </header>

  <div class="wrap">
    <div class="main">
      <section class="player-section">
        <div class="player-wrap glass" id="playerWrap">
          <video id="video" playsinline preload="metadata"></video>
          <div class="player-overlay"></div>
          <div class="controls">
            <button class="ctrl" id="btn-play" title="Play/Pausa">▶</button>
            <button class="ctrl" id="btn-mute" title="Silencio">🔊</button>
            <button class="ctrl" id="btn-pip" title="PiP">⧉</button>
            <button class="ctrl" id="btn-fs" title="Pantalla completa">⛶</button>
          </div>
        </div>
        <div class="info glass">
          <div class="meta">
            <h2 id="now-name">Selecciona un canal</h2>
            <p id="now-group">—</p>
          </div>
          <button class="fav" id="btn-fav" title="Favorito">☆</button>
        </div>
      </section>

      <aside class="sidebar glass" id="sidebar">
        <div class="tabs">
          <button class="tab active" data-tab="all">Canales</button>
          <button class="tab" data-tab="fav">Favoritos</button>
        </div>
        <div class="tools">
          <input class="input" id="search" placeholder="Buscar canal...">
          <select id="group"></select>
        </div>
        <div class="list" id="list"></div>
      </aside>
    </div>
  </div>

  <!-- Modal carga -->
  <div class="modal hidden" id="modal">
    <div class="sheet glass">
      <h3>Cargar Playlist M3U / M3U8</h3>
      <div class="grid2">
        <div>
          <label class="hint">URL remota (https)</label>
          <div style="display:flex; gap:8px; margin:6px 0 10px">
            <input id="url" class="input" placeholder="https://ejemplo.com/lista.m3u">
            <button class="btn" id="load-url">Cargar</button>
          </div>
          <label class="hint">Pegar contenido M3U</label>
          <textarea id="paste" rows="7" placeholder="#EXTM3U
#EXTINF:-1 tvg-logo=&quot;...&quot; group-title=&quot;...&quot;,Canal
https://..."></textarea>
          <div style="display:flex; gap:8px; margin-top:10px; flex-wrap:wrap">
            <button class="btn" id="load-paste">Cargar texto</button>
            <button class="btn mag" id="load-demo">Demo YIYOS</button>
          </div>
        </div>
        <div>
          <div class="hint" style="margin-bottom:8px">Consejos:</div>
          <ul class="hint" style="line-height:1.6; margin:0 0 10px 18px">
            <li>Soporta HLS (.m3u8) vía hls.js</li>
            <li>Guarda automáticamente última lista, canal y favoritos</li>
            <li>En APK (Capacitor) funciona sin CORS</li>
          </ul>
          <button class="btn ghost" id="close-modal" style="width:100%">Cerrar</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// --- Configuración Segura ---
const APP_PASSWORD = "YIYOS2025";

// --- Referencias DOM ---
const video = document.getElementById('video');
const listEl = document.getElementById('list');
const searchEl = document.getElementById('search');
const groupEl = document.getElementById('group');
const nowName = document.getElementById('now-name');
const nowGroup = document.getElementById('now-group');
const btnFav = document.getElementById('btn-fav');
const btnPlay = document.getElementById('btn-play');
const btnMute = document.getElementById('btn-mute');
const btnPip = document.getElementById('btn-pip');
const btnFs = document.getElementById('btn-fs');
const sidebar = document.getElementById('sidebar');
const btnList = document.getElementById('btn-list');
const btnSettings = document.getElementById('btn-settings');
const btnLogout = document.getElementById('btn-logout');
const modal = document.getElementById('modal');
const btnClose = document.getElementById('close-modal');
const urlInput = document.getElementById('url');
const pasteInput = document.getElementById('paste');
const toasts = document.getElementById('toasts');

// --- Estado ---
let hls = null;
let canales = [];
let favoritos = JSON.parse(localStorage.getItem('yiyos-fav') || '[]');
let tab = 'all';
let canalActual = null;

// --- Partículas ---
(function crearParticulas(){
  const p = document.getElementById('particles');
  const total = 36;
  for(let i=0;i<total;i++){
    const s = document.createElement('span');
    s.className = 'particle ' + (i%2? 'cyan':'mag');
    s.style.left = (Math.random()*100)+'%';
    s.style.top = (Math.random()*100)+'%';
    s.style.animationDuration = (14+Math.random()*18)+'s';
    s.style.animationDelay = (-Math.random()*20)+'s';
    s.style.opacity = (0.4+Math.random()*0.6);
    p.appendChild(s);
  }
})();

// --- Sistema de Bloqueo ---
function setupLock(){
  const input = document.getElementById('pass-input');
  const btn = document.getElementById('pass-btn');
  const card = document.querySelector('.lock-card');
  const error = document.getElementById('lock-error');

  const tryUnlock = ()=>{
    if(input.value === APP_PASSWORD){
      localStorage.setItem('yiyos-unlocked','1');
      document.getElementById('lock').classList.add('hide');
      setTimeout(()=>{
        document.getElementById('lock').style.display='none';
        document.getElementById('app').removeAttribute('aria-hidden');
        initApp();
      },280);
    }else{
      error.textContent = 'Contraseña incorrecta';
      card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
      input.value=''; input.focus();
    }
  };
  btn.onclick = tryUnlock;
  input.onkeydown = e=>{ if(e.key==='Enter') tryUnlock(); };
  setTimeout(()=>input.focus(),200);
}

// --- Toasts ---
function toast(msg, tipo='ok'){
  const d = document.createElement('div');
  d.className = 'toast' + (tipo==='err'?' err':'');
  d.textContent = msg;
  toasts.appendChild(d);
  setTimeout(()=>d.remove(), 3600);
}

// --- Parser M3U ---
function parseM3U(texto){
  const lineas = texto.split(/\r?\n/);
  const items = [];
  let temp = null;
  for(let i=0;i<lineas.length;i++){
    const l = lineas[i].trim();
    if(!l) continue;
    if(l.startsWith('#EXTINF')){
      temp = {name:'', logo:'', group:'General', url:''};
      const coma = l.indexOf(',');
      if(coma>-1) temp.name = l.slice(coma+1).trim();
      const logo = l.match(/tvg-logo="([^"]*)"/i); if(logo) temp.logo = logo[1];
      const g = l.match(/group-title="([^"]*)"/i); if(g) temp.group = g[1] || 'General';
      const tn = l.match(/tvg-name="([^"]*)"/i); if(tn && !temp.name) temp.name = tn[1];
    }else if(temp && !l.startsWith('#')){
      temp.url = l;
      temp.id = btoa(temp.url).replace(/=/g,'').slice(0,16);
      if(temp.name) items.push({...temp});
      temp = null;
    }
  }
  return items;
}

// --- Render lista ---
function actualizarGrupos(){
  const grupos = [...new Set(canales.map(c=>c.group))].sort();
  groupEl.innerHTML = '<option value="">Todos los grupos</option>' + grupos.map(g=>`<option>${g}</option>`).join('');
}

function renderLista(){
  const q = searchEl.value.toLowerCase().trim();
  const g = groupEl.value;
  let arr = canales.slice();
  if(tab==='fav') arr = arr.filter(c=> favoritos.includes(c.url));
  if(g) arr = arr.filter(c=> c.group===g);
  if(q) arr = arr.filter(c=> (c.name+' '+c.group).toLowerCase().includes(q));

  listEl.innerHTML = '';
  if(arr.length===0){
    listEl.innerHTML = `<div style="opacity:.7; padding:18px; text-align:center">Sin canales</div>`;
    return;
  }
  arr.forEach(c=>{
    const card = document.createElement('div');
    card.className = 'card' + (canalActual && canalActual.url===c.url? ' active':'');
    card.innerHTML = `
      <img class="thumb" src="${c.logo||'https://dummyimage.com/120x120/0b1228/7de9ff&text=TV'}" alt="" onerror="this.src='https://dummyimage.com/120x120/0b1228/7de9ff&text=TV'">
      <div class="meta-mini">
        <div class="name">${c.name}</div>
        <div class="group">${c.group||'General'}</div>
      </div>`;
    card.onclick = ()=> reproducir(c);
    listEl.appendChild(card);
  });
}

// --- Reproducir ---
async function reproducir(c){
  canalActual = c;
  nowName.textContent = c.name;
  nowGroup.textContent = c.group || 'General';
  btnFav.classList.toggle('active', favoritos.includes(c.url));
  btnFav.textContent = favoritos.includes(c.url)? '★' : '☆';
  localStorage.setItem('yiyos-last', c.url);
  sidebar.classList.remove('open');

  try{
    if(hls){ hls.destroy(); hls=null; }
    const url = c.url;
    if(window.Hls && Hls.isSupported() && /\.m3u8(\?|$)/i.test(url)){
      hls = new Hls({enableWorker:true, lowLatencyMode:true});
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, ()=> video.play().catch(()=>{}));
      hls.on(Hls.Events.ERROR, (_,data)=>{
        if(data.fatal){ toast('Error de stream: '+data.type,'err'); }
      });
    }else{
      video.src = url;
      await video.play().catch(()=>{});
    }
    toast('Reproduciendo: '+c.name);
    renderLista();
  }catch(e){
    toast('No se puede reproducir','err');
  }
}

// --- Favoritos ---
function toggleFav(){
  if(!canalActual) return;
  const u = canalActual.url;
  if(favoritos.includes(u)){
    favoritos = favoritos.filter(x=>x!==u);
    toast('Quitado de favoritos');
  }else{
    favoritos.push(u);
    toast('Añadido a favoritos');
  }
  localStorage.setItem('yiyos-fav', JSON.stringify(favoritos));
  btnFav.classList.toggle('active', favoritos.includes(u));
  btnFav.textContent = favoritos.includes(u)? '★' : '☆';
  if(tab==='fav') renderLista();
}

// --- Cargar ---
async function cargarDesdeTexto(txt){
  const items = parseM3U(txt);
  if(items.length===0){ toast('No se encontraron canales','err'); return; }
  canales = items;
  localStorage.setItem('yiyos-playlist', txt);
  actualizarGrupos();
  renderLista();
  toast('Lista cargada: '+items.length+' canales');
  const last = localStorage.getItem('yiyos-last');
  const primero = canales.find(c=>c.url===last) || canales[0];
  if(primero) reproducir(primero);
}

async function cargarDesdeURL(u){
  try{
    toast('Descargando lista...');
    const res = await fetch(u, {mode:'cors'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const txt = await res.text();
    await cargarDesdeTexto(txt);
    urlInput.value = u;
    localStorage.setItem('yiyos-url', u);
    modal.classList.add('hidden');
  }catch(e){
    toast('Error CORS o URL inválida','err');
  }
}

// --- Inicializador Seguro ---
function initApp(){
  const saved = localStorage.getItem('yiyos-playlist');
  const savedUrl = localStorage.getItem('yiyos-url') || '';
  urlInput.value = savedUrl;
  if(saved){ cargarDesdeTexto(saved); }
  else { cargarDesdeTexto(DEMO); }
  video.addEventListener('error', ()=> toast('Error de reproducción','err'));
}

// Control global de carga inicial y eventos de teclado
window.addEventListener('DOMContentLoaded', ()=>{
  const unlocked = localStorage.getItem('yiyos-unlocked') === '1';
  if(unlocked){
    document.getElementById('lock').style.display = 'none';
    document.getElementById('app').removeAttribute('aria-hidden');
    initApp();
  }else{
    setupLock();
  }
});

window.addEventListener('keydown', e=>{
  if(e.code==='Space' && document.activeElement.tagName!=='INPUT' && document.activeElement.tagName!=='TEXTAREA'){
    e.preventDefault(); btnPlay.click();
  }
});
